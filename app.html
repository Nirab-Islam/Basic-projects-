<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halal Guard Browser</title>
    <style>
        /* পুরো স্ক্রিন রিসেট করা */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* ইউটিউব স্ক্রিন (Full Screen WebView/Iframe) */
        .web-container {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ৩-ডট মেনুর মূল বাটন */
        .three-dot-menu {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 9999;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 12px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            user-select: none;
        }

        /* মেনুর ভেতরের অপশন বক্স (শুরুতে লুকানো থাকবে) */
        .menu-options {
            display: none;
            position: fixed;
            top: 55px;
            right: 15px;
            background: #ffffff;
            color: #333;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            border-radius: 8px;
            width: 180px;
            z-index: 9998;
            overflow: hidden;
        }

        .menu-options a {
            display: block;
            padding: 12px 16px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }

        .menu-options a:hover {
            background-color: #f5f5f5;
        }

        /* যখন মেনু ওপেন হবে তখন দেখানোর জন্য ক্লাস */
        .show {
            display: block !important;
        }
    </style>
</head>
<body>

    <!-- ৩-ডট বাটন -->
    <div class="three-dot-menu" onclick="toggleMenu()">⋮</div>

    <!-- মেনুর ভেতরের অপশনসমূহ -->
    <div class="menu-options" id="myDropdown">
        <a href="#" onclick="alert('ফিল্টার সেটিংস অপশনটি আমরা পরে পাইথন দিয়ে যুক্ত করব!')">🛡️ ফিল্টার সেটিংস</a>
        <a href="#" onclick="location.reload()">🔄 রিফ্রেশ পেজ</a>
        <a href="#" style="color: red;">❌ অ্যাপ বন্ধ করুন</a>
    </div>

    <!-- আসল ইউটিউব ওয়েবসাইট লোড করার ফ্রেম -->
    <!-- (এখানে আপাতত মোবাইল ইউটিউব দেওয়া, পরে পাইথন প্রক্সি দিয়ে এটিকে ফিল্টার করব) -->
    <iframe src="https://m.youtube.com" class="web-container"></iframe>

    <script>
        // ৩-ডট মেনু অন/অফ করার জাভাস্ক্রিপ্ট লজিক
        function toggleMenu() {
            document.getElementById("myDropdown").classList.toggle("show");
        }

        // স্ক্রিনের অন্য কোথাও ক্লিক করলে মেনু স্বয়ংক্রিয়ভাবে বন্ধ হয়ে যাবে
        window.onclick = function(event) {
            if (!event.target.matches('.three-dot-menu')) {
                var dropdowns = document.getElementsByClassName("menu-options");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }
    </script>
</body>
</html>
